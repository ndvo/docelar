# Doce Lar - Kamal Deployment Configuration (Local Network)

service: docelar

image: username/docelar

servers:
  web:
    - <%= ENV['DEPLOY_HOST'] || '192.168.0.1' %>

registry:
  username: <%= ENV['KAMAL_REGISTRY_USERNAME'] || 'dockerhub' %>
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  multiarch: true
  args:
    BUNDLE_WITHOUT: "development:test"

env:
  clear:
    RAILS_SERVE_STATIC_FILES: "true"
    RAILS_ENV: "production"
  secret:
    - RAILS_MASTER_KEY

healthcheck:
  path: /up
  interval: 10s
  timeout: 2s
  retries: 3

volumes:
  - "app_storage:/app/storage"
  - "app_public:/app/public"
  - "app_db:/app/db"
